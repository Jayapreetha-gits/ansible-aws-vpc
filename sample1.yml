 - name: Create Public Route Table
         ec2_vpc_route_table:
                   vpc_id: "{{ vpcout.vpc.id }}"
                             region: "{{ region }}"
                                       tags:
                                                   Name: vprofile-public-rt
                                                             subnets:
                                                                         - "{{ pubsub1_out.subnet.id }}"
                                                                                     - "{{ pubsub2_out.subnet.id }}"
                                                                                                 - "{{ pubsub3_out.subnet.id }}"
                                                                                                           routes:
                                                                                                                       - dest: 0.0.0.0/0
                                                                                                                                     gateway_id: "{{ igw_out.gateway_id }}"
                                                                                                                                             register: pubrt_out
 - name: Create Public Route Table
      ec2_vpc_route_table:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: vprofile-public-rt
        subnets:
          - "{{ pubsub1_out.subnet.id }}"
          - "{{ pubsub2_out.subnet.id }}"
          - "{{ pubsub3_out.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw_out.gateway_id }}"
      register: pubrt_out
